{% extends 'movies/base.html' %}

{% block title %}Film Sil - CineTrack{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body p-4 text-center">
                <i class="fas fa-exclamation-triangle fa-4x text-danger mb-3"></i>
                <h3>Emin misiniz?</h3>
                <p class="text-muted">
                    <strong>{{ movie.title }}</strong> filmini silmek istediğinize emin misiniz?
                    Bu işlem geri alınamaz!
                </p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger me-2">
                        <i class="fas fa-trash"></i> Evet, Sil
                    </button>
                    <a href="{% url 'movies:movie_detail' movie.pk %}" class="btn btn-outline-secondary">
                        İptal
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
