{% extends 'movies/base.html' %}

{% block title %}Giriş Yap - CineTrack{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body p-4">
                <h2 class="text-center mb-4">
                    <i class="fas fa-sign-in-alt"></i> Giriş Yap
                </h2>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label text-white">Kullanıcı Adı</label>
                        <input type="text" name="username" 
                               class="form-control" 
                               style="background-color:#fff; color:#000;"
                               placeholder="Kullanıcı adınız">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-white">Şifre</label>
                        <input type="password" name="password" 
                               class="form-control"
                               style="background-color:#fff; color:#000;"
                               placeholder="Şifreniz">
                    </div>
                    {% if form.errors %}
                    <div class="alert alert-danger">
                        Kullanıcı adı veya şifre hatalı!
                    </div>
                    {% endif %}
                    <button type="submit" class="btn btn-danger w-100">
                        <i class="fas fa-sign-in-alt"></i> Giriş Yap
                    </button>
                </form>
                <p class="text-center mt-3 text-muted">
                    Hesabın yok mu? <a href="{% url 'movies:register' %}" style="color:#e94560;">Kayıt Ol</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
